<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact • Rowgle</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url("https://use.typekit.net/gov0pha.css");
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap');

    body {
      font-family: "Montserrat", sans-serif;
      font-weight: 300;
      background: #000;
      color: #ffffff;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      overflow-y: auto;           /* Allow scrolling if needed */
    }

    video {
      position: fixed;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%);
      object-fit: cover;
      z-index: 1;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 2;
    }

    .pixel-header {
      font-family: 'uniwars', sans-serif;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .square-btn {
      border-radius: 16px;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .square-btn:hover {
      transform: scale(1.05) translateY(-3px);
    }
  </style>
</head>
<body>

  <!-- Fullscreen Video -->
  <video autoplay muted loop playsinline>
    <source src="https://res.cloudinary.com/dtbz0xaw6/video/upload/v1778687710/AdobeStock_441566282_3_dqxbg9.mp4" type="video/mp4">
  </video>

  <!-- Overlay -->
  <div class="overlay"></div>

  <!-- Logo Only (Top Left) -->
  <div class="fixed top-6 left-8 z-50 hidden md:block">
    <a href="../index.html">
      <img src="https://res.cloudinary.com/dtbz0xaw6/image/upload/v1778688457/rowgle-barcode-01_gkhtvf.png" 
           alt="Rowgle" class="h-10">
    </a>
  </div>

  <!-- Contact Form - Smaller on Mobile -->
  <div class="relative z-20 min-h-screen flex items-center justify-center px-6 py-12 md:py-20">
    <div class="max-w-lg w-full bg-black/70 backdrop-blur-2xl border border-white/10 p-8 md:p-12 rounded-3xl">
      <h1 class="pixel-header text-4xl md:text-5xl tracking-widest text-center mb-6">
        LET'S ROW
      </h1>
      <p class="text-center text-gray-400 mb-10 text-base md:text-lg">Tell us about your project. We'll get back to you fast.</p>

      <form class="space-y-8">
        <div>
          <label class="block text-sm text-gray-400 mb-2">YOUR NAME</label>
          <input type="text" required class="w-full bg-black border border-white/30 focus:border-white px-6 py-5 rounded-2xl">
        </div>

        <div>
          <label class="block text-sm text-gray-400 mb-2">EMAIL ADDRESS</label>
          <input type="email" required class="w-full bg-black border border-white/30 focus:border-white px-6 py-5 rounded-2xl">
        </div>

        <div>
          <label class="block text-sm text-gray-400 mb-2">PROJECT DETAILS</label>
          <textarea required rows="5" class="w-full bg-black border border-white/30 focus:border-white px-6 py-5 rounded-3xl"></textarea>
        </div>

        <button type="submit"
                class="square-btn w-full py-6 border border-white text-lg font-medium tracking-widest hover:bg-white hover:text-black transition">
          SEND MESSAGE
        </button>
      </form>
    </div>
  </div>

</body>
</html>
