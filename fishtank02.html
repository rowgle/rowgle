<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fish Tank • Rowgle</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin: 0; padding: 0; }
    body, html {
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    video {
      position: fixed;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%);
      object-fit: cover;
      z-index: 1;
    }
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.25); /* 25% black overlay */
      z-index: 2;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- Top Left Logo -->
  <div class="fixed top-6 left-8 z-50">
    <a href="../index.html">
      <img src="https://res.cloudinary.com/dtbz0xaw6/image/upload/v1778688457/rowgle-barcode-01_gkhtvf.png"
           alt="Rowgle" class="h-10">
    </a>
  </div>

  <!-- Fullscreen Video -->
  <video autoplay muted loop playsinline>
    <source src="https://res.cloudinary.com/dtbz0xaw6/video/upload/v1778687710/AdobeStock_441566282_3_dqxbg9.mp4" type="video/mp4">
  </video>

  <!-- 25% Black Overlay -->
  <div class="overlay"></div>

</body>
</html>
